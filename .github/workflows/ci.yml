name: Continuous Integration

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel superseded runs on the same ref (PRs), but let push runs on the
# long-lived branches finish so their status is always recorded.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this is a test-only pipeline and needs nothing but repo read.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Formatting Check
        # Mirrors the `format:check` script glob, which includes the .ts sources.
        run: npm run format:check

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Build Server Artifact
        # Integration suites boot `dist/server.js` in worker_threads, so the
        # compiled artifact must exist before the test run.
        run: npm run build

      - name: Run Tests
        # `vitest run` executes all three projects (node, jsdom, browser).
        run: npm test

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-test]
    steps:
      - name: All checks passed
        run: echo "Verification successful"
