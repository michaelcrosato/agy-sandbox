name: Continuous Integration

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Formatting Check
        run: npx prettier --check "src/**/*.{js,json}" "scripts/**/*.js" ".github/**/*.md" README.md

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm test

  client-tests:
    # Client (DOM) suite runs under Vitest + jsdom, kept separate from the Jest
    # engine matrix above so runtime regressions surface without duplicating it.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Client Tests
        run: npm run test:client

  verify:
    runs-on: ubuntu-latest
    needs: [build-and-test, client-tests]
    steps:
      - name: All checks passed
        run: echo "Verification successful"
