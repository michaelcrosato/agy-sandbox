name: Continuous Integration

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel superseded runs on the same ref (PRs), but let push runs on the
# long-lived branches finish so their status is always recorded.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this is a test-only pipeline and needs nothing but repo read.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        # The node project's PlaywrightVisual integration test launches Chromium
        # (capture-only, no golden comparison), so the browser must be present.
        run: npx playwright install chromium --with-deps

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Formatting Check
        # Mirrors the `format:check` script glob, which includes the .ts sources.
        run: npm run format:check

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Build Server Artifact
        # Integration suites boot `dist/server.js` in worker_threads, so the
        # compiled artifact must exist before the test run.
        run: npm run build

      - name: Run Node Suite
        # Run only the `node` Vitest project across the full 22/24/26 matrix:
        # pure engine/net/physics/persistence/server suites plus the
        # scripts/agent control-plane tests. The jsdom client suite runs in the
        # separate `client-tests` job (jsdom 29 lacks localStorage on Node 26),
        # and the browser project asserts against win32 golden PNGs so it is
        # local-only (Windows baselines) and cannot match on Linux CI.
        run: npm run test:node

  client-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Pinned to Node 24: jsdom 29 does not provide `localStorage` under Node 26,
    # so the jsdom client suite is exercised on the same single version the
    # original client-tests job used.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run jsdom Client Suite
        # Runs only the `jsdom` Vitest project. These units import `.ts` source
        # via Vite (not the `dist/` build), so no build step is needed here.
        run: npm run test:client

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-test, client-tests]
    steps:
      - name: All checks passed
        run: echo "Verification successful"
