name: Continuous Integration

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel superseded runs on the same ref (PRs), but let push runs on the
# long-lived branches finish so their status is always recorded.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this is a test-only pipeline and needs nothing but repo read.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24', '26']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Formatting Check
        run: npx prettier --check "src/**/*.{js,json}" "scripts/**/*.js" ".github/**/*.md" README.md

      - name: Run Linting
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm test

  client-tests:
    # Client (DOM) suite runs under Vitest + jsdom, kept separate from the Jest
    # engine matrix above so runtime regressions surface without duplicating it.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Substrate Integrity
        run: npm run agent:verify-substrate

      - name: Run Client Tests
        run: npm run test:client

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-test, client-tests]
    steps:
      - name: All checks passed
        run: echo "Verification successful"
